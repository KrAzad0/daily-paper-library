name: Update Paper Index

on:
  push:
    branches: [ main ]
    paths:
      - 'papers/**.md'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    name: Scan papers and update index

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Run index updater
        run: |
          python scripts/update_index.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add papers/index.json README.md topics/
          git diff --staged --quiet || git commit -m "chore: Auto-update index and topic files [skip ci]"
          git push
